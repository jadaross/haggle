services:
  - type: web
    name: haggle-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    healthCheckPath: /health
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: haggle-db
          property: connectionString
      - key: HAGGLE_SECRET_KEY
        generateValue: true
      - key: HARD_DAILY_CAP
        value: "50"
      - key: LOG_LEVEL
        value: "INFO"
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: haggle-db
    databaseName: haggle
    user: haggle
    plan: free
